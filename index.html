<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كم بحبك؟</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #07030f;
  --pink: #e8457a;
  --pink-soft: #ff8fab;
  --blue: #7b5ea7;
  --gold: #f5c842;
  --white: #fff;
  --dim: rgba(255,255,255,0.13);
}

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  color: var(--white);
}

/* ── Animated gradient bg ── */
.bg-glow {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(123,94,167,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(232,69,122,0.18) 0%, transparent 70%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  from { opacity: 0.7; }
  to   { opacity: 1; }
}

/* ── Stars ── */
.stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--d) infinite ease-in-out alternate;
}
@keyframes twinkle {
  from { opacity: 0.05; }
  to   { opacity: 0.8; }
}

/* ── Main ── */
.wrap {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 1.5rem;
  width: 100%;
  max-width: 600px;
}

/* Question */
.question {
  font-size: clamp(1.1rem, 4vw, 1.4rem);
  font-weight: 300;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;
  animation: fadeUp 1s 0.3s both;
}

.answer-text {
  font-size: clamp(1.6rem, 5.5vw, 2.4rem);
  font-weight: 900;
  line-height: 1.5;
  animation: fadeUp 1s 0.8s both;
}
.answer-text .pink { color: var(--pink-soft); }
.answer-text .gold { color: var(--gold); }

/* ── Clock ── */
.clock-wrap {
  margin: 2.2rem auto 0;
  animation: fadeUp 1s 1.3s both;
}

.clock-label {
  font-size: 0.8rem;
  font-weight: 300;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.clock-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0.4rem;
}

.unit-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
}

.unit-num {
  font-size: clamp(2.8rem, 10vw, 5rem);
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(160deg, #fff 30%, var(--pink-soft));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  min-width: 2ch;
  text-align: center;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.unit-num.bump { transform: scale(1.18); }

.unit-label {
  font-size: 0.7rem;
  font-weight: 400;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.12em;
}

.sep {
  font-size: clamp(2rem, 7vw, 3.5rem);
  font-weight: 900;
  color: var(--pink);
  opacity: 0.5;
  margin-bottom: 1.4rem;
  line-height: 1;
}

/* ── Live message ── */
.live-msg {
  margin-top: 2rem;
  min-height: 2.2rem;
  font-size: clamp(1rem, 3.5vw, 1.25rem);
  font-weight: 400;
  color: var(--pink-soft);
  animation: fadeUp 1s 2s both;
  transition: opacity 0.4s;
}
.live-msg.fade { opacity: 0; }

/* ── Heartbeat line ── */
.pulse-wrap {
  margin: 1.8rem auto 0;
  width: 220px;
  height: 40px;
  animation: fadeUp 1s 2.3s both;
}
.pulse-wrap svg { width: 100%; height: 100%; }
.pulse-path {
  stroke: var(--pink);
  stroke-width: 2;
  fill: none;
  stroke-dasharray: 400;
  stroke-dashoffset: 400;
  animation: drawPulse 2s 2.5s ease forwards, pulseFade 2s 4.5s ease-in-out infinite alternate;
}
@keyframes drawPulse {
  to { stroke-dashoffset: 0; }
}
@keyframes pulseFade {
  from { opacity: 1; }
  to   { opacity: 0.3; }
}

/* ── Floating hearts ── */
.fheart {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  animation: floatUp var(--dur) linear infinite;
  opacity: 0;
  bottom: -40px;
  left: var(--x);
  font-size: var(--fs);
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(-10deg); opacity: 0; }
  10%  { opacity: 0.5; }
  90%  { opacity: 0.2; }
  100% { transform: translateY(-105vh) rotate(15deg); opacity: 0; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="stars" id="stars"></div>

<!-- Floating hearts -->
<div id="fhearts"></div>

<div class="wrap">
  <p class="question">كم بتحبني من سبعة؟</p>

  <div class="answer-text">
    <span class="pink">٧ أيام</span> بالأسبوع<br>
    <span class="gold">٢٤ ساعة</span> باليوم<br>
    وكل <span class="pink">ثانية</span> فيهم
  </div>

  <div class="clock-wrap">
    <div class="clock-label">وهاي الثواني بتعدّ عليك</div>
    <div class="clock-row">
      <div class="unit-box">
        <div class="unit-num" id="dd">00</div>
        <div class="unit-label">يوم</div>
      </div>
      <div class="sep">:</div>
      <div class="unit-box">
        <div class="unit-num" id="hh">00</div>
        <div class="unit-label">ساعة</div>
      </div>
      <div class="sep">:</div>
      <div class="unit-box">
        <div class="unit-num" id="mm">00</div>
        <div class="unit-label">دقيقة</div>
      </div>
      <div class="sep">:</div>
      <div class="unit-box">
        <div class="unit-num" id="ss">00</div>
        <div class="unit-label">ثانية</div>
      </div>
    </div>
  </div>

  <div class="live-msg" id="liveMsg">💗</div>

  <div class="pulse-wrap">
    <svg viewBox="0 0 220 40">
      <polyline class="pulse-path"
        points="0,20 30,20 45,5 55,35 65,10 75,30 85,20 220,20"/>
    </svg>
  </div>
</div>

<script>
// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 100; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s`;
  starsEl.appendChild(s);
}

// ── Floating hearts ──
const fhEl = document.getElementById('fhearts');
const emojis = ['💗','💖','💕','🌸','✨','💫','🌙','❤️'];
for (let i = 0; i < 14; i++) {
  const h = document.createElement('div');
  h.className = 'fheart';
  h.textContent = emojis[i % emojis.length];
  h.style.cssText = `--x:${Math.random()*100}%;--fs:${(Math.random()*16+10).toFixed(0)}px;--dur:${(Math.random()*12+8).toFixed(1)}s;animation-delay:${(Math.random()*12).toFixed(1)}s`;
  fhEl.appendChild(h);
}

// ── Clock: counts up from page load (every second = love) ──
const start = Date.now();
const msgs = [
  'بفكر فيكِ 💭','وانتِ بالي دايمًا 🌙','ما في لحظة إلا وانتِ فيها 💗',
  'حبك أكبر من أي رقم 🌌','كل ثانية بتعدّي، بحبك أكثر ⏳',
  'ما بقدر أوصف، بس قلبي بيعرف 💞','إلك كل شي 🌸','انتِ السبب 💫',
  'من غيرك ما في معنى للوقت ⌛','بحبك أكثر من اللازم 😄💗'
];
let msgIdx = 0;
const liveMsg = document.getElementById('liveMsg');

function pad(n) { return String(n).padStart(2,'0'); }

function bump(id) {
  const el = document.getElementById(id);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}

function tick() {
  const elapsed = Math.floor((Date.now() - start) / 1000);
  const d = Math.floor(elapsed / 86400);
  const h = Math.floor((elapsed % 86400) / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const s = elapsed % 60;

  const prev = document.getElementById('ss').textContent;
  document.getElementById('dd').textContent = pad(d);
  document.getElementById('hh').textContent = pad(h);
  document.getElementById('mm').textContent = pad(m);
  document.getElementById('ss').textContent = pad(s);

  if (pad(s) !== prev) bump('ss');

  // Change message every 5 seconds
  if (elapsed % 5 === 0 && elapsed > 0) {
    liveMsg.classList.add('fade');
    setTimeout(() => {
      msgIdx = (msgIdx + 1) % msgs.length;
      liveMsg.textContent = msgs[msgIdx];
      liveMsg.classList.remove('fade');
    }, 400);
  }
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
