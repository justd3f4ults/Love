<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كم بحبك؟</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0618;
    --purple-deep: #1a0a2e;
    --purple-mid: #2d1254;
    --pink: #ff6b9d;
    --pink-light: #ffb3cc;
    --gold: #ffd700;
    --white: #fff;
  }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Stars background */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) infinite ease-in-out alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }

  /* Floating hearts */
  .floating-hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .fheart {
    position: absolute;
    font-size: var(--fs, 20px);
    animation: floatUp var(--dur, 8s) linear infinite;
    opacity: 0;
    bottom: -50px;
    left: var(--x, 50%);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-110vh) rotate(30deg); opacity: 0; }
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 700px;
    width: 100%;
  }

  /* Screen states */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── SCREEN 1: The question ── */
  #screen-question .question-label {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: var(--pink-light);
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 1.2rem;
    opacity: 0;
    animation: fadeIn 1s 0.3s forwards;
  }
  #screen-question .question-text {
    font-size: clamp(2rem, 7vw, 4rem);
    font-weight: 900;
    color: var(--white);
    line-height: 1.3;
    opacity: 0;
    animation: fadeIn 1s 0.8s forwards;
  }
  #screen-question .question-text span {
    color: var(--pink);
  }
  #screen-question .sub {
    margin-top: 1rem;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    color: #a89fc0;
    font-weight: 300;
    opacity: 0;
    animation: fadeIn 1s 1.4s forwards;
  }
  .btn-main {
    margin-top: 2.5rem;
    display: inline-block;
    padding: 0.9rem 3rem;
    background: linear-gradient(135deg, var(--pink), #c94b8a);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 1s 2s forwards;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(255,107,157,0.4);
  }
  .btn-main:hover {
    transform: scale(1.05);
    box-shadow: 0 0 45px rgba(255,107,157,0.7);
  }

  /* ── SCREEN 2: Numbers 1–7 ── */
  #screen-numbers .numbers-prompt {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: var(--pink-light);
    margin-bottom: 2rem;
    font-weight: 300;
    animation: fadeIn 0.6s forwards;
  }
  .numbers-grid {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .num-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid rgba(255,107,157,0.4);
    background: rgba(255,107,157,0.08);
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0;
    animation: popIn 0.5s forwards;
  }
  .num-btn:nth-child(1) { animation-delay: 0.1s; }
  .num-btn:nth-child(2) { animation-delay: 0.2s; }
  .num-btn:nth-child(3) { animation-delay: 0.3s; }
  .num-btn:nth-child(4) { animation-delay: 0.4s; }
  .num-btn:nth-child(5) { animation-delay: 0.5s; }
  .num-btn:nth-child(6) { animation-delay: 0.6s; }
  .num-btn:nth-child(7) { animation-delay: 0.7s; }
  .num-btn:hover {
    background: rgba(255,107,157,0.25);
    border-color: var(--pink);
    transform: scale(1.15);
    box-shadow: 0 0 20px rgba(255,107,157,0.5);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }
  .hint-text {
    font-size: 0.95rem;
    color: #6b5f80;
    font-weight: 300;
    animation: fadeIn 1s 1s forwards;
    opacity: 0;
  }

  /* ── SCREEN 3: The answer ── */
  #screen-answer .big-number {
    font-size: clamp(5rem, 20vw, 10rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--pink), var(--gold), var(--pink-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    animation: scaleIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
  }
  #screen-answer .strike-container {
    position: relative;
    display: inline-block;
  }
  #screen-answer .strike-line {
    position: absolute;
    top: 50%;
    left: -5%;
    width: 0;
    height: 5px;
    background: var(--pink);
    border-radius: 3px;
    animation: strikeThrough 0.6s 1.2s ease forwards;
  }
  @keyframes strikeThrough {
    to { width: 110%; }
  }
  #screen-answer .answer-main {
    margin-top: 1.5rem;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--white);
    opacity: 0;
    animation: fadeIn 0.8s 1.8s forwards;
    line-height: 1.4;
  }
  #screen-answer .answer-main span {
    color: var(--pink);
  }
  #screen-answer .answer-sub {
    margin-top: 1rem;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: var(--pink-light);
    font-weight: 300;
    opacity: 0;
    animation: fadeIn 0.8s 2.4s forwards;
  }
  #screen-answer .answer-heart {
    font-size: clamp(3rem, 8vw, 5rem);
    margin-top: 1.5rem;
    opacity: 0;
    animation: heartBeat 0.6s 3s ease forwards;
    display: inline-block;
  }
  #screen-answer .restart-btn {
    margin-top: 2rem;
    display: inline-block;
    padding: 0.6rem 2rem;
    background: transparent;
    color: #6b5f80;
    border: 1px solid #3d2c5e;
    border-radius: 50px;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 0.8s 3.5s forwards;
    transition: all 0.2s;
  }
  .restart-btn:hover {
    color: var(--pink-light);
    border-color: var(--pink);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.3); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes heartBeat {
    0%   { opacity: 0; transform: scale(0); }
    60%  { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1);   opacity: 1; }
  }

  /* Burst particles */
  .burst {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 1.5rem;
    animation: burst-fly 1.2s ease-out forwards;
  }
  @keyframes burst-fly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--bx), var(--by)) scale(0.3); }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>
<!-- Floating hearts -->
<div class="floating-hearts" id="fhearts"></div>

<div class="container">

  <!-- Screen 1: Question -->
  <div class="screen active" id="screen-question">
    <p class="question-label">سألتك سؤال...</p>
    <h1 class="question-text">كم بتحبني<br><span>من سبعة؟</span></h1>
    <p class="sub">فكّر زين قبل ما تجاوب 🤍</p>
    <button class="btn-main" onclick="showNumbers()">أنا جاهز أجاوب</button>
  </div>

  <!-- Screen 2: Number picker -->
  <div class="screen" id="screen-numbers">
    <p class="numbers-prompt">اختار الرقم...</p>
    <div class="numbers-grid">
      <button class="num-btn" onclick="pickNumber(1)">١</button>
      <button class="num-btn" onclick="pickNumber(2)">٢</button>
      <button class="num-btn" onclick="pickNumber(3)">٣</button>
      <button class="num-btn" onclick="pickNumber(4)">٤</button>
      <button class="num-btn" onclick="pickNumber(5)">٥</button>
      <button class="num-btn" onclick="pickNumber(6)">٦</button>
      <button class="num-btn" onclick="pickNumber(7)">٧</button>
    </div>
    <p class="hint-text">مهما اخترت، ما رح يكون كافي 🌙</p>
  </div>

  <!-- Screen 3: The real answer -->
  <div class="screen" id="screen-answer">
    <div class="strike-container">
      <div class="big-number" id="chosen-number">٧</div>
      <div class="strike-line"></div>
    </div>
    <div class="answer-main">الأرقام <span>ما بتكفي</span></div>
    <div class="answer-sub">لأن حبي إلك ما إله سقف 🌌</div>
    <div class="answer-heart">💗</div>
    <br>
    <button class="restart-btn" onclick="restart()">← ارجع للبداية</button>
  </div>

</div>

<script>
// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 3 + 1;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%;
    left:${Math.random()*100}%;
    --d:${(Math.random()*4+2).toFixed(1)}s;
    animation-delay:${(Math.random()*5).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// ── Floating hearts ──
const fheartsEl = document.getElementById('fhearts');
const heartEmojis = ['💗','💖','💕','🌸','✨','💫','🌙'];
for (let i = 0; i < 18; i++) {
  const h = document.createElement('div');
  h.className = 'fheart';
  h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  h.style.cssText = `
    --x:${Math.random()*100}%;
    --fs:${(Math.random()*20+12).toFixed(0)}px;
    --dur:${(Math.random()*10+7).toFixed(1)}s;
    animation-delay:${(Math.random()*10).toFixed(1)}s;
  `;
  fheartsEl.appendChild(h);
}

// ── Arabic numerals map ──
const arabicNums = { 1:'١', 2:'٢', 3:'٣', 4:'٤', 5:'٥', 6:'٦', 7:'٧' };

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showNumbers() {
  showScreen('screen-numbers');
}

function pickNumber(n) {
  document.getElementById('chosen-number').textContent = arabicNums[n];
  // Burst effect
  burst(event);
  setTimeout(() => showScreen('screen-answer'), 400);
}

function burst(e) {
  const emojis = ['💗','💖','✨','🌸','💫','🌙','💕'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'burst';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.PI * 2 / 12) * i;
    const dist = 80 + Math.random() * 80;
    el.style.cssText = `
      left:${e.clientX}px; top:${e.clientY}px;
      --bx:${(Math.cos(angle)*dist).toFixed(0)}px;
      --by:${(Math.sin(angle)*dist).toFixed(0)}px;
      animation-delay:${(Math.random()*0.1).toFixed(2)}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

function restart() {
  showScreen('screen-question');
}
</script>
</body>
</html>
